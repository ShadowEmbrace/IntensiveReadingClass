<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit 5：The Guide to Being a Foodie Without Being Culturally Appropriative </title>
    <style>
        :root {
            --bg-color: #fcfcf9;
            --text-color: #222;
            --accent-color: #e63946;
            --btn-color: #2d3436;
            --placeholder-bg: #f0f0eb;
            --font-main: 32px;
            --font-title: 60px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Times New Roman', serif;
            line-height: 1.6;
            overflow-x: hidden;
            padding-bottom: 100px;
        }

        header {
            padding: 80px 40px;
            text-align: center;
            background: #fff;
            border-bottom: 2px solid #eee;
        }

        h1 { font-size: var(--font-title); font-weight: bold; }

        .container { max-width: 1200px; margin: 40px auto; padding: 20px; }

        .para-block {
            margin-bottom: 80px;
            padding: 40px;
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            clear: both;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

		.para-block:hover {
			background-color: #fff9db;
			transition: background-color 0.3s ease;
		}

		.para-block:nth-child(even) {
			background-color: #f8f9fa;
		}

        .text-wrap {
            width: 95%;
            font-size: var(--font-main);
            position: relative;
            padding-left: 100px;
            text-align: justify;
			line-height: 1.6;
			overflow: visible;
			color: #333
        }

        .audio-trigger {
            position: absolute;
            left: 0;
            top: 5px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: var(--btn-color);
            color: white;
            border: none;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        .audio-trigger:hover { background: var(--accent-color); transform: scale(1.1); }

        .img-display {
		    float: right;
			width: 35%;
			max-width: 400px;
			height: auto;
			max-height: 600px;
			object-fit: contain;
			margin: 10px 0 15px 20px;
			border: 1px solid #ddd;
		}

        #sketchpad {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 500;
            pointer-events: none;
        }
        #sketchpad.active { pointer-events: auto; cursor: crosshair; }

        .controls {
            position: fixed;
            bottom: 40px;
            right: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 1000;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: white;
            border: 4px solid var(--btn-color);
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-btn.active { background: var(--accent-color); border-color: var(--accent-color); }
        .icon-btn svg { width: 25px; height: 25px; }

        #note-box {
            position: fixed;
            top: 20%;
            left: 30%;
            width: 500px;
            min-height: 350px;
            background: white;
            border: 5px solid var(--btn-color);
            z-index: 2000;
            display: none;
            flex-direction: column;
            box-shadow: 20px 20px 0 rgba(0,0,0,0.1);
        }
        .note-header {
            background: var(--btn-color);
            color: white;
            padding: 10px;
            cursor: move;
            display: flex;
            justify-content: space-between;
        }
        .note-body {
            flex-grow: 1;
            padding: 20px;
            font-size: 36px;
            color: #0000FF;
            border: none;
            outline: none;
            resize: both;
        }
    /* ========================================================
           📱 移动端（手机）响应式适配样式
           当屏幕宽度小于 768px 时，以下样式会自动生效，优化手机阅读体验
           ======================================================== */
        @media (max-width: 768px) {
            :root {
                --font-main: 20px;   /* 手机端正文：从大屏的 32px 缩小到舒适的 20px */
                --font-title: 32px;  /* 手机端标题：从大屏的 60px 缩小到 32px */
            }

            header {
                padding: 30px 15px;  /* 缩减顶部标题区域的上下留白 */
            }

            h1 {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 10px;           /* 手机上让标题和播放按钮上下错开，避免挤在一行 */
            }

            .container {
                margin: 10px auto;   /* 缩减网页外层上下间距 */
                padding: 10px;       /* 缩减网页左右两侧的留空 */
            }

            .para-block {
                margin-bottom: 25px; /* 缩减段落与段落之间的超大间距 */
                padding: 20px 15px;  /* 缩减卡片内部的四周留白（非常关键！） */
            }

            .text-wrap {
                width: 100%;         /* 让文字区域占满卡片，不再浪费空间 */
                padding-left: 55px;  /* 缩减左侧音频按钮占用的空间，给文字腾地方 */
                text-align: left;    /* 手机上建议用左对齐，两端对齐（justify）会导致单词间距忽大忽小 */
            }

            .audio-trigger {
                width: 45px;         /* 缩小段落前面的音频按钮尺寸 */
                height: 45px;
                font-size: 18px;
                top: 0;              /* 微调按钮对齐位置 */
            }

            .img-display {
                float: none;         /* 取消图片右浮动，避免在窄屏上把文字挤成一缕 */
                display: block;
                width: 100%;         /* 图片在手机上独自占满一行 */
                max-width: 100%;
                margin: 0 0 15px 0;  /* 改为下方留空，让文字在图片下面舒服地流淌 */
            }
        }
    </style>
</head>
<body>

<header>
    <h1>The Guide to Being a Foodie Without Being Culturally Appropriative
	<button onclick="playTitleAudio()" style="
            margin-left: 15px; 
            padding: 5px 15px; 
            font-size: 24px; 
            font-family: sans-serif;
            background-color: #2d3436; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer;
            vertical-align: middle;
            transition: 0.3s;"
            onmouseover="this.style.backgroundColor='#e63946'"
            onmouseout="this.style.backgroundColor='#2d3436'">
            🎵 播放
        </button>
	</h1>
</header>
<img src="media/images/heading.png" 
     style="display: block; margin: 0 auto; width: 100%; max-width: 1160px; height: auto;" 
     onerror="this.style.display='none'">
<div class="container" id="main-content"></div>

<canvas id="sketchpad"></canvas>

<div class="controls">
    <button class="icon-btn" id="pen-toggle">
        <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25z"/></svg>
    </button>
    <button class="icon-btn" id="note-toggle">
        <svg viewBox="0 0 24 24"><path d="M20 5H4c-1.1 0-1.99.9-1.99 2L2 17c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm-9 3h2v2h-2V8zm0 3h2v2h-2v-2zM8 8h2v2H8V8zm0 3h2v2H8v-2zm-1 2H5v-2h2v2zm0-3H5V8h2v2zm9 7H8v-2h8v2zm0-4h-2v-2h2v2zm0-3h-2V8h2v2zm3 3h-2v-2h2v2zm0-3h-2V8h2v2z"/></svg>
    </button>
    <button class="icon-btn" id="canvas-clear">
        <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    </button>
</div>

<div id="note-box">
    <div class="note-header" id="drag-handle">
        <span>TEACHER NOTES</span>
        <span style="cursor:pointer" onclick="document.getElementById('note-box').style.display='none'">[X]</span>
    </div>
    <textarea class="note-body" placeholder="Start typing..."></textarea>
</div>

<script>
    const paras = [
        `1 I watch a lot of competitive cooking shows. And it seems like whenever there is a "bizarre" or "exotic" cooking ingredient, it's associated with foods from my culture and childhood, for example 100-year-old egg or stinky tofu. `,
        `2 Mainstream media has made a spectacle out of foods from seemingly exotic places, and I've also observed a lot of White chefs create "Asian-inspired" dishes. When going out to eat, I notice many "Asian-fusion" themed restaurants where chefs combine all tastes in the vast and diverse continent of Asia and throw them together on both plate and menu. `,
        `3 What is "Asian-inspired" or "Asian-fusion?" I have a sinking suspicion it's not like when my mom made me sushi with cucumbers, lunch meat, and eggs. Or toast with mayonnaise and pork sung. People used to make fun of the food I eat, and now suddenly, stuff like Spam fried rice is selling at a hip new restaurant for $16. It's frustrating when my culture gets consumed and appropriated as both trend and tourism. Yet when it comes to food, what's appropriation and what's not can be tricky to think about. `,
        `4 Cultural appropriation is when a dominant culture adopts parts of another culture from people that it has oppressed. The dominant culture can try the food and love the food without ever having to experience oppression. Yet food appropriation isn't just eating food from someone else's culture. It might not be appropriation if you're white and you love eating dumplings and hand-pulled noodles. Enjoying food from another culture is perfectly fine. But, food is appropriated when people from the dominant culture start to fetishize or commercialize it, and when they hoard access to that particular food. `,
        `5 When a dominant culture reduces another community to its cuisine, turns histories and stories into menu items and when people think culture can be understood with a bite of food, that's where it gets problematic. It's also harmful when the dominant culture controls the economic and material resources to produce that food for their own consumption and profit. `,
        `6 Here are some dining behaviors that are culturally appropriative when it comes to food. `,
        `7 Often, when we talk about "ethnic" food, we're not referring to French, German, or Italian cuisine. Usually, we're talking about Thai, Vietnamese, Indian, Ethiopian, and Mexican food—places where food is cooked by the "brownest" people. While food from Western Europe is still connected to ethnic roots, ethnic food has become reserved only for ethnicities that are perceived as exotic and foreign to White folks. `,
        `8 While food can connect people together and serve as a way to learn about cultures other than our own, what happens is that food becomes the only symbol for certain places. Japan is reduced to ramen and sushi, Mexico is reduced to tacos, India is reduced to curry, and so on. Entire regions become reduced to menu options and ingredients, without any thought to the many different communities in these places. There's a loss of complexity and cultures end up getting homogenized. `,
        `9 In seeking "authentic" food, we're hoping for a truly immersive experience into another culture. The food experience, whether in a restaurant in someone's home city or as part of a trip somewhere else, comes to represent a larger experience with that culture and community. Our perceptions of what is "authentic" stem from preconceived "exotic narratives" of that culture and communities. For example, it's not uncommon to hear someone say: "Oh, during my trip to Asia, I had the most authentic [fill in the blank]." `,
        `10 Food culture has travelled in messy and complicated ways across the globe. The impacts of historical and continuing colonization are devastating to many cultures, and many "authentic" "ethnic" cuisines are connected to histories of colonization. For example, the use of Spam in different parts of Asia and the Pacific Islands, like Spam musubi or Spam in hot pot, are a direct result of U.S. colonization. Of course, this is not necessarily a bad thing in itself: If you love a dish and think it's delicious, great! If you're searching for a place that serves a particular dish, also great! However, seeking "authenticity" does not always show respect for the food of another culture. The idea of the "authentic" food experience is separated from reality. It also freezes a culture in a particular place in time. `,
        `11 When food gets disconnected from the communities and places it's from, people start forgetting about the oppression faced by those communities. Folks might love Mexican food, but not care about different issues such as labor rights and immigration policy that impact members from that community. There are also really hurtful stereotypes connected to food where people of color get reduced to the food they eat or are called things like smelly because of their food consumption. `,
        `12 Eating food from another culture in isolation from that culture's history and also current issues means that we're just borrowing the pieces that are enjoyable. We might not know how Kung Pao chicken also reflects a story about Chinese immigration or the complex colonial story behind curry and the homogenization of South Asian cultures. `,
        `13 More and more now, part of chefs' training also involves travel in order to learn about different cooking techniques and ingredients. Because of this they're opening up fancy restaurants that repurpose "cheap" eats from working class and poor communities that rely on affordable, local products and ingredients. As a result, food culture gets re-colonized by chefs seeking to make that "authentic" street food they tried more elegant. Often, these restaurants are inaccessible to the communities they're appropriating from. This is different from when members from that community repurpose their own traditional foods. `,
        `14 One of the questions that both chefs and diners should ask themselves is, who is laboring and profiting? Where are these recipes from? Who is this cuisine profiting off? Is it a group that is historically and currently oppressed? `,
        `15 Another problem is when ingredients get reappropriated. Corporations have now repackaged local food from different places in ways that make it no longer accessible to the local communities they're from. For example, quinoa, which is native to Bolivia is now too expensive for communities there. Last year, Whole Foods declared collard greens the "new kale." Coconuts have now been packaged as high-end, luxury water. Tofu, soy, and tempeh are now staples at organic, healthy food markets. `,
        `16 This is food gentrification, where communities can no longer afford their own cuisines and sustain their traditions. `,
        `17 Food is an important part of communities and cultures—the relationship between food and culture also means that food can be used as a tool of oppression. `,
        `18 It's okay if you love the taco truck outside of your workplace, love eating sushi, or enjoy trying out different recipes at home. I'm not against trying and cooking food outside your own culture—I love it, too. `,
        `19 However, it's critical for us to reflect on how we perceive the cultures that we're consuming and think about the relationships between food, people, and power. `,
        `20 Colonization and gentrification are directly related to the appropriation of food. We need to begin educating ourselves on issues that impact the communities that we're getting our meals from. `
    
    ];

    const container = document.getElementById('main-content');

    paras.forEach((p, i) => {
        const div = document.createElement('div');
        div.className = 'para-block';
        const imgIdx = String(i+1).padStart(2,'0');
        const baseName = `media/images/img_${imgIdx}`;
		const extensions = ['.webp', '.jpg', '.jpeg', '.png', '.avif'];
		div.innerHTML = `
            <div class="text-wrap">
			${extensions.map(ext => `
			<img src="${baseName}${ext}"
                 class="img-display"
                 alt="Visual Resource ${i+1}"
                 style="display: none;"
                 onload="this.style.display='block'"
                 onerror="this.style.display='none'">
        `).join('')}
                <button class="audio-trigger" onclick="playAudio(${i}+1)">${i+1}</button>
                <p class="para-text" style="display: inline; font-size: var(--font-main); color: #333;">${p}</p>
            </div>
        `;
        container.appendChild(div);
    });

	let currentAudio = null;
	let currentIdx = null;

	function playAudio(idx) {
		if (currentAudio && currentIdx === idx) {
			currentAudio.pause();
			currentAudio = null;
			currentIdx = null;
			return;
		}

		if (currentAudio) {
			currentAudio.pause();
		}

		const formattedIdx = String(idx).padStart(2, '0');
		const audioPath = `media/audio/unit5_-${formattedIdx}.mp3`;

		currentAudio = new Audio(audioPath);
		currentIdx = idx;
		currentAudio.play().catch(() => {
			console.log(`Audio file unit5_-${formattedIdx}.mp3 not found.`);
		});
	}

    const canvas = document.getElementById('sketchpad');
    const ctx = canvas.getContext('2d');
    const penToggle = document.getElementById('pen-toggle');
    let drawing = false;
    let penActive = false;

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    penToggle.onclick = () => {
        penActive = !penActive;
        penToggle.classList.toggle('active', penActive);
        canvas.classList.toggle('active', penActive);
    };

    document.getElementById('canvas-clear').onclick = () => ctx.clearRect(0, 0, canvas.width, canvas.height);

    canvas.onmousedown = (e) => { if(!penActive) return; drawing = true; ctx.beginPath(); ctx.moveTo(e.clientX, e.clientY); };
    canvas.onmousemove = (e) => { 
        if(!drawing || !penActive) return; 
        ctx.lineTo(e.clientX, e.clientY); 
        ctx.strokeStyle = 'red'; ctx.lineWidth = 4; ctx.stroke(); 
    };
    canvas.onmouseup = () => drawing = false;

    const noteBox = document.getElementById('note-box');
    document.getElementById('note-toggle').onclick = () => {
        noteBox.style.display = (noteBox.style.display === 'flex') ? 'none' : 'flex';
    };

    let drag = false;
    let ox, oy;
    const handle = document.getElementById('drag-handle');
    handle.onmousedown = (e) => { drag = true; ox = e.clientX - noteBox.offsetLeft; oy = e.clientY - noteBox.offsetTop; };
    window.onmousemove = (e) => { if(drag) { noteBox.style.left = (e.clientX - ox) + 'px'; noteBox.style.top = (e.clientY - oy) + 'px'; } };
    window.onmouseup = () => drag = false;
function playTitleAudio() {
		// 1. 如果当前点击的是标题音频，且音频已经存在
		if (currentAudio && currentIdx === 'title') {
			if (currentAudio.paused) {
				// 如果当前是暂停状态，点击则恢复播放
				currentAudio.play().catch(() => {
					console.log(`无法恢复播放音频 text.mp3`);
				});
			} else {
				// 如果当前是播放状态，点击则暂停
				currentAudio.pause();
			}
			return;
		}

		// 2. 如果当前正在播放其他段落的音频，先将其暂停
		if (currentAudio) {
			currentAudio.pause();
		}

		// 3. 首次点击标题音频，初始化并播放
		const audioPath = 'media/audio/text.mp3'; 
		currentAudio = new Audio(audioPath);
		currentIdx = 'title';
		currentAudio.play().catch(() => {
			console.log(`Audio file text.mp3 not found.`);
		});
	}

</script>
</body>
</html>
